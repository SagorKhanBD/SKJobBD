<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
SK BD Registration
</title>


<link rel="stylesheet" href="register.css">


</head>


<body>


<header>

<h1>
SK BD
</h1>

<p>
Create Your Account
</p>

</header>



<div class="container">


<h2>
📝 নতুন একাউন্ট তৈরি করুন
</h2>



<form id="registerForm">



<label>
Account Type *
</label>


<select id="accountType" required>

<option value="">
Select Account Type
</option>

<option value="candidate">
Candidate (চাকরি প্রার্থী)
</option>

<option value="company">
Company (প্রতিষ্ঠান)
</option>

<option value="education">
Education Institute (শিক্ষা প্রতিষ্ঠান)
</option>

</select>




<label>
আপনার নাম *
</label>


<input 
type="text"
id="name"
placeholder="আপনার নাম লিখুন"
required>




<label>
মোবাইল নম্বর *
</label>


<input 
type="text"
id="mobile"
placeholder="01XXXXXXXXX"
required>




<label>
প্রতিষ্ঠানের নাম *
</label>


<input 
type="text"
id="institution"
placeholder="প্রতিষ্ঠানের নাম লিখুন"
required>




<label>
প্রতিষ্ঠানের কোড (Optional)
</label>


<input 
type="text"
id="institutionCode"
placeholder="Institution Code">




<label>
Email (Optional)
</label>


<input 
type="email"
id="email"
placeholder="Email Address">




<label>
Password *
</label>


<input 
type="password"
id="password"
placeholder="কমপক্ষে ৮ অক্ষর"
required>




<label>
Confirm Password *
</label>


<input 
type="password"
id="confirmPassword"
placeholder="Password আবার লিখুন"
required>





<button type="submit">

Register Account

</button>



</form>




<p id="message"></p>



<p class="login-link">

আগে থেকেই Account আছে?

<a href="login.html">
Login করুন
</a>


</p>



</div>




<script type="module" src="register.js"></script>


</body>

</html>
