<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SK BD | Registration</title>

    <link rel="stylesheet" href="register.css">
</head>

<body>

    <div class="container">

        <div class="logo">
            <h1>SK BD</h1>
            <p>Create Your Account</p>
        </div>

        <form id="registerForm">

            <h2>নতুন একাউন্ট নিবন্ধন</h2>

            <!-- Account Type -->
            <label>Account Type <span>*</span></label>

            <select id="accountType" required>

                <option value="">-- নির্বাচন করুন --</option>

                <option value="candidate">
                    চাকরি প্রার্থী
                </option>

                <option value="company">
                    কোম্পানি / প্রতিষ্ঠান
                </option>

                <option value="education">
                    শিক্ষা প্রতিষ্ঠান
                </option>

            </select>

            <!-- Name -->

            <label>আপনার নাম <span>*</span></label>

            <input
                type="text"
                id="name"
                placeholder="সম্পূর্ণ নাম লিখুন"
                required>

            <!-- Mobile -->

            <label>মোবাইল নম্বর <span>*</span></label>

            <input
                type="tel"
                id="mobile"
                placeholder="01XXXXXXXXX"
                maxlength="11"
                required>

            <!-- Institution -->

            <label>প্রতিষ্ঠানের নাম <span>*</span></label>

            <input
                type="text"
                id="institution"
                placeholder="প্রতিষ্ঠানের নাম লিখুন"
                required>

            <!-- Institution Code -->

            <label>প্রতিষ্ঠানের কোড (যদি থাকে)</label>

            <input
                type="text"
                id="institutionCode"
                placeholder="Institution Code">

            <!-- Email -->

            <label>Email (Optional)</label>

            <input
                type="email"
                id="email"
                placeholder="example@gmail.com">

            <!-- Password -->

            <label>Password <span>*</span></label>

            <input
                type="password"
                id="password"
                placeholder="কমপক্ষে ৮ অক্ষর"
                minlength="8"
                required>

            <!-- Confirm Password -->

            <label>Confirm Password <span>*</span></label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="পুনরায় Password লিখুন"
                minlength="8"
                required>

            <!-- Register Button -->

            <button
                type="submit"
                id="registerBtn">

                Register Account

            </button>

            <p id="message"></p>

        </form>

        <div class="bottom">

            <p>

                ইতিমধ্যে একাউন্ট আছে?

                <a href="login.html">

                    Login করুন

                </a>

            </p>

        </div>

    </div>

    <script type="module" src="register.js"></script>

</body>

</html>
