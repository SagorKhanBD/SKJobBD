<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
SK Job BD - Admin Panel
</title>


<link rel="stylesheet" href="admin.css">


</head>


<body>


<header class="admin-header">

<h1>
SK Job BD
</h1>

<p>
Admin Management Panel
</p>

</header>



<main class="admin-container">



<!-- LOGIN AREA -->

<section class="box" id="loginBox">


<h2>
🔐 Admin Login
</h2>


<input 
type="email"
id="adminEmail"
placeholder="Admin Email">


<input 
type="password"
id="adminPassword"
placeholder="Password">


<button onclick="adminLogin()">
Login
</button>


<p id="loginMessage"></p>


</section>






<!-- ADMIN PANEL -->


<div id="panel" style="display:none;">





<section class="box">


<h2>
📊 Dashboard
</h2>


<div class="dashboard">


<div>

<h3>
Jobs
</h3>

<p id="jobCount">
0
</p>

</div>



<div>

<h3>
Companies
</h3>

<p id="companyCount">
0
</p>

</div>



<div>

<h3>
Applications
</h3>

<p id="applicationCount">
0
</p>

</div>


</div>


</section>







<section class="box">


<h2>
➕ নতুন চাকরি পোস্ট করুন
</h2>


<input 
id="jobTitle"
placeholder="চাকরির নাম">


<input 
id="company"
placeholder="প্রতিষ্ঠানের নাম">



<textarea
id="description"
placeholder="চাকরির বিস্তারিত">
</textarea>



<input 
type="date"
id="deadline">



<input
id="applyLink"
placeholder="আবেদন লিংক">



<button onclick="addJob()">
চাকরি প্রকাশ করুন
</button>


<p id="message"></p>


</section>








<section class="box">


<h2>
📋 প্রকাশিত চাকরি
</h2>


<div id="jobList">

</div>


</section>






<button onclick="logout()">
Logout
</button>



</div>




</main>






<footer>

<p>
© 2026 SK Job BD
</p>

</footer>





<script type="module" src="admin.js"></script>


</body>


</html>
