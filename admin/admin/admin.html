<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
SK Job BD Admin Panel
</title>


<link rel="stylesheet" href="admin.css">


<script src="../config.js"></script>


<script type="module" src="../firebase.js"></script>


<script type="module" src="admin.js"></script>


</head>


<body>


<header class="admin-header">

<h1>
SK Job BD Admin Panel
</h1>

<p>
Career & Education Management System
</p>

</header>





<main class="admin-container">



<!-- Admin Login -->

<section class="box">


<h2>
🔐 Admin Login | প্রশাসক লগইন
</h2>


<input 
type="email"
id="adminEmail"
placeholder="Email">


<input 
type="password"
id="adminPassword"
placeholder="Password">


<button onclick="adminLogin()">

Login

</button>


<p id="loginMessage"></p>


</section>







<!-- Dashboard -->

<section class="box">


<h2>
📊 Dashboard
</h2>


<div class="dashboard">


<div>

<h3>
Jobs
</h3>

<p id="jobCount">
0
</p>

</div>



<div>

<h3>
Companies
</h3>

<p id="companyCount">
0
</p>

</div>



<div>

<h3>
Applications
</h3>

<p id="applicationCount">
0
</p>

</div>


</div>


</section>








<!-- Add Job -->


<section class="box">


<h2>
➕ Add New Job | নতুন চাকরি যোগ করুন
</h2>



<input 
id="jobTitle"
placeholder="Job Title | চাকরির নাম">



<input 
id="company"
placeholder="Company Name | প্রতিষ্ঠানের নাম">



<textarea
id="description"
placeholder="Job Description | বিস্তারিত">
</textarea>




<input 
id="deadline"
type="date">



<input 
id="applyLink"
placeholder="Apply Link">



<button onclick="addJob()">

Add Job

</button>



<p id="message"></p>



</section>







<!-- Job List -->

<section class="box">


<h2>
📋 Job List
</h2>


<div id="jobList">

</div>


</section>







</main>





<footer>


<p>
© 2026 SK Job BD
</p>


</footer>




</body>

</html>
