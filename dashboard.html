<!DOCTYPE html>
<html lang="bn">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SK BD User Dashboard</title>

<link rel="stylesheet" href="dashboard.css">

</head>

<body>

<header>

<h1>SK BD</h1>

<h3>User Dashboard</h3>

</header>

<div class="dashboard">

<div class="card">

<h2>👤 User Information</h2>

<hr>

<p><strong>নাম :</strong> <span id="userName"></span></p>

<p><strong>মোবাইল :</strong> <span id="userMobile"></span></p>

<p><strong>Account Type :</strong> <span id="userType"></span></p>

<p><strong>প্রতিষ্ঠানের নাম :</strong> <span id="userInstitution"></span></p>

<p><strong>Email :</strong> <span id="userEmail"></span></p>

<p><strong>Status :</strong> <span id="userStatus"></span></p>

</div>

<div class="card">

<h2>⚙️ Quick Menu</h2>

<hr>

<button onclick="window.location.href='index.html'">
🏠 Home
</button>

<button onclick="window.location.href='profile.html'">
👤 My Profile
</button>

<button onclick="window.location.href='jobs.html'">
💼 Job List
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
