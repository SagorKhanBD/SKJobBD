<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SK BD Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<header>

<h1>SK BD</h1>

<h3>User Login</h3>

</header>

<div class="container">

<h2>🔐 লগইন করুন</h2>

<form id="loginForm">

<label>মোবাইল নম্বর</label>

<input
type="text"
id="mobile"
placeholder="01XXXXXXXXX"
required>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p id="message"></p>

<br>

<p>

একাউন্ট নেই?

<a href="registration.html">

Registration করুন

</a>

</p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
